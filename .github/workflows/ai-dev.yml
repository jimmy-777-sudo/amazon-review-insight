name: AI 自动开发

on:
  issues:
    types: [opened, labeled]

jobs:
  build:
    if: |
      (github.event.action == 'labeled' && github.event.label.name == 'ai-build') ||
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'ai-build'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 运行 AI Agent
        run: python agent.py
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
