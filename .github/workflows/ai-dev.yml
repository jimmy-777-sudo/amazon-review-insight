name: AI 自动开发

on:
  issues:
    types: [labeled]

jobs:
  build:
    if: github.event.label.name == 'ai-build'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            请读取 Issue #${{ github.event.issue.number }} 的需求描述，
            完成以下步骤：

            1. 理解需求，确认所有输入输出明确
            2. 实现代码（放在合适的文件里）
            3. 编写对应的测试
            4. 运行测试，确保全部通过
            5. 如果测试失败，分析原因并修复，最多尝试 3 轮
            6. 更新 README.md（如果是新功能）
            7. 所有改动提交到一个新分支，分支名格式：feature/${{ github.event.issue.number }}-<简短描述>
            8. 创建一个 Pull Request，PR 描述里写清楚改了什么、怎么测试

            PR 标题格式：[#${{ github.event.issue.number }}] <功能概述>
          claude_args: "--max-turns 20"
